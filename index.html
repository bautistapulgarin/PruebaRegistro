<!DOCTYPE html>

<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo + Firestore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Hola Mundo!</h1>
        
        <div class="form-group">
            <label for="mensaje">Tu mensaje:</label>
            <input type="text" id="mensaje" placeholder="Escribe algo..." autocomplete="off">
        </div>

        <button onclick="guardarMensaje()">Guardar en Firestore</button>

        <div id="status" class="status"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="./index_files/firebase-app.js.descarga"></script>
    <script src="./index_files/firebase-firestore.js.descarga"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA4RILJXoZFKOuBx1I74kvuZzHk7uy1M18",
            authDomain: "hola-mundo-app-92284.firebaseapp.com",
            projectId: "hola-mundo-app-92284",
            storageBucket: "hola-mundo-app-92284.firebasestorage.app",
            messagingSenderId: "1002122237226",
            appId: "1:1002122237226:web:3d6bfd1d0807ea69913a53"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function guardarMensaje() {
            const mensaje = document.getElementById('mensaje').value.trim();
            const statusDiv = document.getElementById('status');

            if (!mensaje) {
                statusDiv.textContent = '⚠️ El campo no puede estar vacío';
                statusDiv.className = 'status error';
                return;
            }

            statusDiv.textContent = '⏳ Guardando...';
            statusDiv.className = 'status loading';

            try {
                await db.collection('mensajes').add({
                    contenido: mensaje,
                    fecha: new Date(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                statusDiv.textContent = '✅ ¡Guardado correctamente en Firestore!';
                statusDiv.className = 'status success';
                document.getElementById('mensaje').value = '';

                setTimeout(() => {
                    statusDiv.className = 'status';
                }, 3000);
            } catch (error) {
                statusDiv.textContent = '❌ Error: ' + error.message;
                statusDiv.className = 'status error';
            }
        }

        // Permitir guardar con Enter
        document.getElementById('mensaje').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') guardarMensaje();
        });
    </script>


</body></html>
